user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    upstream dockops_backend {
        server backend:8080;
        keepalive 32;
    }

    upstream resolvehub_backend {
        server resolvehub-backend:5000;
        keepalive 16;
    }

    upstream resolvehub_frontend {
        server resolvehub-frontend:80;
        keepalive 8;
    }

    server {
        listen 80;
        server_name _;

        # ── DockOps WebSocket ──────────────────────────────────────────
        location /dockops/ws/ {
            proxy_pass http://dockops_backend/dockops/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # ── DockOps API ────────────────────────────────────────────────
        location /dockops/ {
            proxy_pass http://dockops_backend/dockops/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_read_timeout 300s;
        }

        # ── ResolveHub Health (for DockOps monitoring) ────────────────
        location = /resolvehub/health {
            proxy_pass http://resolvehub_backend/resolvehub/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── ResolveHub Metrics ─────────────────────────────────────────
        location = /resolvehub/health/metrics {
            proxy_pass http://resolvehub_backend/resolvehub/health/metrics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── ResolveHub API ─────────────────────────────────────────────
        location /resolvehub/api/ {
            proxy_pass http://resolvehub_backend/resolvehub/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_read_timeout 300s;
        }

        # ── ResolveHub Frontend ────────────────────────────────────────
        location /resolvehub/ {
            proxy_pass http://resolvehub_frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        location / {
            return 404 '{"error": "Not found"}';
            add_header Content-Type application/json;
        }
    }
}
