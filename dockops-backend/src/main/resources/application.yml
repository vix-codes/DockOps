spring:
  application:
    name: dockops-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dockops}
    username: ${DB_USERNAME:dockops}
    password: ${DB_PASSWORD:dockops_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: ${PORT:8080}
  servlet:
    context-path: /dockops
  error:
    include-message: always
    include-binding-errors: always

app:
  jwt:
    secret: ${JWT_SECRET:dockops-super-secret-jwt-key-must-be-at-least-256-bits-long-for-HS512}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

  ssh:
    connection-timeout: ${SSH_CONNECTION_TIMEOUT:30000}
    session-timeout: ${SSH_SESSION_TIMEOUT:60000}
    max-pool-size: ${SSH_MAX_POOL_SIZE:10}

  metrics:
    collection-interval-ms: ${METRICS_INTERVAL_MS:30000}

  gemini:
    api-key: ${GEMINI_API_KEY:}
    api-url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

  webhook:
    secret: ${WEBHOOK_SECRET:dockops-webhook-secret}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.dockops: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
